name: Build iOS IPA

# Builds a signed .ipa whenever you push to the `prod` branch.
# You can also trigger it manually (Actions tab -> Build iOS IPA -> Run workflow)
# and choose a different export method.
on:
  push:
    branches: [prod]
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method for the IPA"
        type: choice
        default: app-store
        options:
          - app-store   # for App Store / TestFlight (NOT directly installable on a device)
          - ad-hoc      # installable on devices whose UDIDs are registered in your Apple account
          - development # installable on registered dev devices
          - enterprise  # only for Apple Developer Enterprise Program accounts

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    # iOS builds must run on macOS. Apple requires builds from the iOS 26 SDK
    # (Xcode 26+), which is available on the macos-15 runner image.
    runs-on: macos-15

    env:
      # Falls back to app-store when triggered by a push (no manual input available).
      EXPORT_METHOD: ${{ github.event.inputs.export_method || 'app-store' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Apple requires the iOS 26 SDK (Xcode 26+) for App Store uploads.
          xcode-version: latest-stable

      - name: Show Xcode / SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets + sync Capacitor (iOS)
        run: |
          npm run build
          npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      # ----------------------------------------------------------------------
      # Code signing setup. All of these values come from GitHub repo Secrets.
      # See docs/ios-cicd-setup.md for exactly how to create each one.
      # ----------------------------------------------------------------------
      - name: Install Apple distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode the certificate from the base64 secret.
          echo -n "$DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain just for this build.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate (+ its private key) into the keychain.
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          # Make the temp keychain the one xcodebuild searches.
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROVISION_PROFILE_BASE64" ]; then
            echo "::error::Secret IOS_PROVISIONING_PROFILE_BASE64 is empty. Create a Distribution provisioning profile for 'uk.co.talentshield.hrms' that matches your export method (App Store for the default), then store it as a base64 secret. See docs/ios-cicd-setup.md."
            exit 1
          fi
          PROFILE_PATH="$RUNNER_TEMP/app.mobileprovision"
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Decode the CMS-signed profile so we can read its UUID and Name.
          PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PLIST")

          # Install it where Xcode looks for provisioning profiles.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          # Expose the profile name to later steps (archive + ExportOptions).
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Write App Store Connect API key
        env:
          # Store the .p8 as BASE64 in this secret (see docs) so newlines can't be lost.
          APPSTORE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          # Optional: manual code signing (below) does NOT need this key. It is only
          # required if you later add an App Store / TestFlight upload step. Skip if unset.
          if [ -z "$APPSTORE_API_PRIVATE_KEY_BASE64" ]; then
            echo "No App Store Connect API key set — skipping (not needed for manual signing)."
            exit 0
          fi
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          echo -n "$APPSTORE_API_PRIVATE_KEY_BASE64" | base64 --decode -o "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

          # Fail fast with a clear message if the decoded key isn't a valid PEM.
          if ! head -n 1 "$API_KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded API key is not a valid .p8 PEM. Re-create APPSTORE_API_PRIVATE_KEY_BASE64 from 'base64 -w0 AuthKey_XXXX.p8'."
            exit 1
          fi

      - name: Generate ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>uk.co.talentshield.hrms</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "Using export method: $EXPORT_METHOD"
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive (xcodebuild)
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Signing is defined in the Xcode project (manual). We only inject the team here.
          # The build number (CURRENT_PROJECT_VERSION) must be unique + increasing for every
          # App Store Connect upload, so we tie it to the GitHub run number.
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export IPA (xcodebuild)
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrms-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      # Push the build to App Store Connect (TestFlight / App Store). Only for the
      # app-store export method — ad-hoc/development IPAs can't be uploaded there.
      - name: Upload to App Store Connect
        if: ${{ env.EXPORT_METHOD == 'app-store' }}
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          if [ -z "${API_KEY_PATH:-}" ] || [ ! -f "${API_KEY_PATH:-/nonexistent}" ]; then
            echo "::error::App Store Connect API key not available. Set APPSTORE_API_KEY_ID, APPSTORE_API_ISSUER_ID and APPSTORE_API_PRIVATE_KEY_BASE64 secrets to enable upload."
            exit 1
          fi
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)
          echo "Uploading $IPA to App Store Connect (build ${{ github.run_number }})..."
          # altool discovers the key at ~/.appstoreconnect/private_keys/AuthKey_<id>.p8
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$APPSTORE_API_KEY_ID" --apiIssuer "$APPSTORE_API_ISSUER_ID"
          echo "Upload submitted. After Apple finishes processing (a few minutes), the build"
          echo "appears in App Store Connect -> your app -> TestFlight / Distribution."

      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$API_KEY_PATH" || true
