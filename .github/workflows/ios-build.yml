name: Build iOS IPA

# Builds a signed .ipa whenever you push to the `prod` branch.
# You can also trigger it manually (Actions tab -> Build iOS IPA -> Run workflow)
# and choose a different export method.
#
# Uses MANUAL code signing: a distribution certificate (.p12) + a provisioning
# profile (.mobileprovision), both stored as base64 GitHub Secrets. The build
# signs offline and never contacts Apple, so there are no App Store Connect API
# keys and no 401 authentication failures.
on:
  push:
    branches: [prod]
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method (auto = detect from the provisioning profile)"
        type: choice
        default: auto
        options:
          - auto        # detect from the provisioning profile you uploaded as a secret
          - app-store   # for App Store / TestFlight (NOT directly installable on a device)
          - ad-hoc      # installable on devices whose UDIDs are registered in your Apple account
          - development # installable on registered dev devices
          - enterprise  # only for Apple Developer Enterprise Program accounts

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    # iOS builds must run on macOS. macos-14 = Apple Silicon with recent Xcode.
    runs-on: macos-14

    env:
      # Manual override from a manual run; 'auto' on push -> detect from the profile.
      EXPORT_METHOD_OVERRIDE: ${{ github.event.inputs.export_method || 'auto' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets + sync Capacitor (iOS)
        run: |
          npm run build
          npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      # ----------------------------------------------------------------------
      # Code signing setup. All values come from GitHub repo Secrets.
      # See docs/ios-cicd-setup.md for exactly how to create each one.
      # ----------------------------------------------------------------------
      - name: Install Apple distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode the certificate from the base64 secret.
          echo -n "$DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain just for this build.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate (+ its private key) into the keychain.
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          # Make the temp keychain the one xcodebuild searches.
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile (manual signing)
        env:
          # base64 of the .mobileprovision you downloaded from developer.apple.com
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          if [ -z "$PROVISION_PROFILE_BASE64" ]; then
            echo "::error::Secret IOS_PROVISION_PROFILE_BASE64 is empty. See docs/ios-cicd-setup.md."
            exit 1
          fi

          # Decode the profile and read its embedded plist.
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")

          # Detect the export method from the profile's contents.
          if /usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" "$PROFILE_PLIST" >/dev/null 2>&1; then
            DETECTED="enterprise"
          elif /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" "$PROFILE_PLIST" >/dev/null 2>&1; then
            if /usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" "$PROFILE_PLIST" 2>/dev/null | grep -qi true; then
              DETECTED="development"
            else
              DETECTED="ad-hoc"
            fi
          else
            DETECTED="app-store"
          fi

          if [ "$EXPORT_METHOD_OVERRIDE" = "auto" ] || [ -z "$EXPORT_METHOD_OVERRIDE" ]; then
            FINAL_METHOD="$DETECTED"
          else
            FINAL_METHOD="$EXPORT_METHOD_OVERRIDE"
          fi

          # Install the profile where Xcode looks for it.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          echo "Profile name : $PROFILE_NAME"
          echo "Profile UUID : $PROFILE_UUID"
          echo "Method       : $FINAL_METHOD (detected: $DETECTED, override: $EXPORT_METHOD_OVERRIDE)"

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "EXPORT_METHOD=$FINAL_METHOD" >> "$GITHUB_ENV"

      - name: Generate ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.talentshield.hrms</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "Using export method: $EXPORT_METHOD"
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive (xcodebuild, manual signing)
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID"

      - name: Export IPA (xcodebuild)
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrms-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Clean up signing material
        if: ${{ always() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" || true
