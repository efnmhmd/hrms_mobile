# NginxUI gateway site — runs on the FRONT/gateway nginx.
# Public entrypoint for hrmsmobile.vitruxshield.com. Terminates TLS and
# reverse-proxies to the PWA-serving nginx on our server (91.99.248.184:80).
# Port 80 keeps the ACME challenge and redirects everything else to HTTPS.

upstream pwa_origin {
    server 91.99.248.184:80;
    keepalive 32;
}

# HTTP :80 — serve ACME challenge, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name hrmsmobile.vitruxshield.com;

    # Keep ACME HTTP-01 on :80 so cert issuance/renewal still works.
    location ~ /.well-known/acme-challenge {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
        proxy_pass http://127.0.0.1:9180;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — TLS termination + reverse proxy to the PWA origin.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hrmsmobile.vitruxshield.com;

    ssl_certificate     /etc/nginx/ssl/hrmsmobile.vitruxshield.com_P256/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/hrmsmobile.vitruxshield.com_P256/private.key;

    # Allow uploads to pass through to the origin if the app ever needs it.
    client_max_body_size 25m;

    location / {
        proxy_pass http://pwa_origin;
        proxy_http_version 1.1;
        # Keep the original Host so the origin nginx serves the right vhost.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ /.well-known/acme-challenge {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
        proxy_pass http://127.0.0.1:9180;
    }
}
