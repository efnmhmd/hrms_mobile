# Talent Shield HRMS PWA — hrmsmobile.vitruxshield.com
# Static Vite SPA served straight from /home/administrator/hrms_mobile/dist.
# The app calls https://hrms.vitruxshield.com/api directly (cross-origin),
# so nginx does NO proxying here — pure static hosting.
#
# Add as a NEW SITE in NginxUI. HTTP only — let NginxUI's "Obtain a certificate"
# add SSL + the redirect itself.
#
# PERMISSIONS: /home/administrator is 750, so www-data can't reach dist. Run once:
#   sudo chmod o+x /home/administrator
# (-> 751: others can traverse, not list. dist files are already o+r, and
#  umask 0002 keeps new build files readable after each rebuild.)

server {
    listen 80;
    listen [::]:80;
    server_name hrmsmobile.vitruxshield.com;

    root /home/administrator/hrms_mobile/dist;
    index index.html;

    # Let's Encrypt / NginxUI ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /home/administrator/hrms_mobile/dist;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service worker must always revalidate so updates ship immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        types { } default_type "application/javascript";
    }

    # Manifest — correct type, short cache.
    location = /manifest.webmanifest {
        types { } default_type "application/manifest+json";
        add_header Cache-Control "no-cache" always;
    }

    # Never cache the HTML shell (so new asset hashes are always picked up).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # Content-hashed build assets — cache hard, forever.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — every unknown route returns index.html for the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
